# Render Blueprint — https://dashboard.render.com/blueprints
# Repo: https://github.com/Amankushwaha2005/techwithaman-website

databases:
  - name: techwithaman-db
    databaseName: web_project
    user: web_project
    plan: free
    region: singapore

services:
  - type: web
    name: techwithaman-website
    runtime: node
    plan: free
    region: singapore
    branch: main
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: techwithaman-db
          property: connectionString
      - key: SESSION_SECRET
        generateValue: true
      - key: PAYMENT_ADVANCE_PERCENT
        value: "50"
      - key: BASE_URL
        value: https://techwithaman-website-2026.onrender.com
      - key: RAZORPAY_KEY_ID
        sync: false
      - key: RAZORPAY_KEY_SECRET
        sync: false
      - key: ADMIN_EMAILS
        sync: false
      - key: RECAPTCHA_SITE_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        value: https://techwithaman-website-2026.onrender.com/auth/google/callback
      - key: PGSSL
        value: "true"
